<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foster Labs</title>
<meta name="description" content="Family apps by the Fosters">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
    background:#0a0a1a;
    color:#e2e8f0;
  }
  .container{max-width:480px;width:100%;text-align:center}
  h1{font-size:32px;font-weight:900;letter-spacing:-0.5px;margin-bottom:4px;
    background:linear-gradient(135deg,#fff,#94a3b8);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:#64748b;font-size:14px;font-weight:600;margin-bottom:36px}
  .apps{display:grid;gap:16px}
  .app{
    display:flex;align-items:center;gap:16px;
    padding:20px;border-radius:20px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    text-decoration:none;color:inherit;
    transition:all 0.2s ease;
  }
  .app:hover{background:rgba(255,255,255,0.08);transform:translateY(-2px);border-color:rgba(255,255,255,0.15)}
  .app-icon{
    width:56px;height:56px;border-radius:16px;
    display:flex;align-items:center;justify-content:center;
    font-size:24px;flex-shrink:0;
  }
  .app-info{text-align:left}
  .app-name{font-weight:800;font-size:17px;margin-bottom:2px}
  .app-desc{font-size:13px;color:#64748b;font-weight:600}
  .footer{margin-top:48px;color:#334155;font-size:12px;font-weight:600}
</style>
</head>
<body>
<div class="container">
  <h1>Foster Labs</h1>
  <p class="sub">Family apps, built with love.</p>
  <div class="apps">
    <a href="/spelling/" class="app">
      <div class="app-icon" style="background:linear-gradient(135deg,#6366f1,#d946ef)">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
      </div>
      <div class="app-info">
        <div class="app-name">Spelling Quiz</div>
        <div class="app-desc">Charles's List 14 — The /s/ Sound</div>
      </div>
    </a>
    <a href="/gin/" class="app">
      <div class="app-icon" style="background:linear-gradient(135deg,#4f46e5,#9333ea)">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>
      </div>
      <div class="app-info">
        <div class="app-name">Vicious Gin</div>
        <div class="app-desc">Card game scorer with Gemini scan</div>
      </div>
    </a>
  </div>
  <p class="footer">fosterlabs.org</p>
</div>
</body>
</html>
