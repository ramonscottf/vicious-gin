  get: (key) => {
    try {
      const val = localStorage.getItem(STORAGE_PREFIX + key);
      return val ? JSON.parse(val) : null;
    } catch { return null; }
  },
  set: (key, val) => {
    try {
      localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(val));
      return true;
    } catch { return false; }
  },
  clear: () => {
    Object.keys(localStorage).filter(k => k.startsWith(STORAGE_PREFIX)).forEach(k => localStorage.removeItem(k));

      <div style={{color:"#546e7a",marginBottom:16,fontSize:11}}>Public records and intelligence sources. All legal. All free or low-cost. Open links in new tab.</div>
      {SNOOPING_TOOLS.map(cat=>(
        <div key={cat.category} style={S.card}>
          <div style={{fontSize:11,fontWeight:700,color:"#29b6f6",letterSpacing:2,marginBottom:12,textTransform:"uppercase"}}>{cat.category}</div>
          {cat.links.map(l=>(
            <div key={l.name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #0a0a12"}}>
              <div>
                <a href={l.url} target="_blank" rel="noopener noreferrer" style={{...S.link,fontWeight:600}}>{l.name} ↗</a>
                <div style={{fontSize:10,color:"#546e7a",marginTop:2}}>{l.desc}</div>
              </div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );

  const renderNotes = () => (
    <div>
      <div style={S.cardTitle}>Master Intelligence Notes</div>
      <textarea style={{...S.textarea,minHeight:500}} value={data.notes} onChange={e=>save({...data,notes:e.target.value})} placeholder="Investigation notes, theories, observations..."/>
      <div style={{color:"#546e7a",fontSize:10,marginTop:8}}>Auto-saved to browser storage. Persistent across sessions.</div>
    </div>
  );

  const views = {dashboard:renderDashboard,entities:renderEntities,persons:renderPersons,redflags:renderRedFlags,checklist:renderChecklist,extraction:renderExtraction,timeline:renderTimeline,tools:renderTools,notes:renderNotes};

  return (
    <div style={{background:"#06060b",minHeight:"100vh"}}>
      <div style={S.header}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:28}}>&#9763;</span>
          <div>
            <div style={{fontSize:18,fontWeight:800,letterSpacing:3,color:"#ff1744",textTransform:"uppercase"}}>SKIPPY WAR ROOM</div>
            <div style={{fontSize:10,color:"#546e7a",letterSpacing:2,marginTop:2}}>HIRES ENTERPRISES — FORENSIC INVESTIGATION</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontSize:10,color:"#546e7a",letterSpacing:1}}>CLASSIFIED</span>
          <button style={S.btnGhost} onClick={resetData}>RESET</button>
        </div>
      </div>
      <div style={S.tabBar}>
        {tabs.map(t=>(
          <div key={t.id} style={S.tab(activeTab===t.id)} onClick={()=>setActiveTab(t.id)}>
            <span>{t.icon}</span><span>{t.label}</span>
          </div>
        ))}
      </div>
      <div style={S.content}>{views[activeTab]()}</div>
      <div style={{borderTop:"1px solid #1a1a2e",padding:"12px 24px",display:"flex",justifyContent:"space-between",color:"#1a1a2e",fontSize:9,letterSpacing:1}}>
        <span>SKIPPY INTELLIGENCE DIVISION — FOSTER LABS</span>
        <span>v{VERSION} — LOCAL STORAGE ACTIVE</span>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
