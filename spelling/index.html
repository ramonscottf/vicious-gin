<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap');

  *{box-sizing:border-box;margin:0;padding:0}

  body{
    font-family:'Nunito',sans-serif;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:20px;
    background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#d946ef 100%);
    transition:background 0.6s ease;
  }

  button{cursor:pointer;border:none;transition:all 0.2s ease;font-family:'Nunito',sans-serif}
  button:hover{transform:translateY(-2px);filter:brightness(1.05)}
  button:active{transform:translateY(0);filter:brightness(0.97)}
  input:focus{outline:none}

  /* Icons — consistent SVG-based system */
  .icon{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
  .icon svg{width:1em;height:1em;fill:currentColor}

  /* Animations */
  @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-12px)}40%{transform:translateX(12px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
  @keyframes bounce{0%,100%{transform:scale(1)}35%{transform:scale(1.06)}65%{transform:scale(0.97)}}
  @keyframes pop{from{transform:scale(0.4);opacity:0}60%{transform:scale(1.08)}to{transform:scale(1);opacity:1}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @keyframes fly{to{transform:translate(var(--dx),var(--dy)) rotate(var(--rot));opacity:0}}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  @keyframes glow{0%,100%{box-shadow:0 0 12px rgba(139,92,246,0.3)}50%{box-shadow:0 0 24px rgba(139,92,246,0.6)}}

  .fadeUp{animation:fadeUp 0.45s cubic-bezier(0.22,1,0.36,1)}
  .shake{animation:shake 0.45s ease}
  .bounce{animation:bounce 0.45s ease}
  .pop{animation:pop 0.3s cubic-bezier(0.22,1,0.36,1)}
  .float{animation:float 3s ease-in-out infinite}
  .pulsing{animation:pulse 0.5s ease-in-out infinite}
  .confetti{position:fixed;pointer-events:none;z-index:9999;animation:fly 0.9s ease-out forwards}

  /* Card glass effect */
  .glass{background:rgba(255,255,255,0.12);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.18)}

  /* Category badges */
  .cat-badge{
    display:inline-flex;align-items:center;gap:6px;
    border-radius:10px;padding:4px 14px;
    font-size:13px;font-weight:800;
    color:#fff;letter-spacing:0.3px;
    box-shadow:0 2px 8px rgba(0,0,0,0.12);
  }
  .cat-badge .badge-icon{
    width:18px;height:18px;
    border-radius:50%;
    background:rgba(255,255,255,0.25);
    display:flex;align-items:center;justify-content:center;
    font-size:11px;
  }

  /* Heart icons */
  .heart{display:inline-block;transition:all 0.35s ease}
  .heart--empty{opacity:0.2;filter:grayscale(1)}

  /* Progress bar */
  .progress-track{background:rgba(0,0,0,0.08);border-radius:20px;height:8px;overflow:hidden}
  .progress-fill{height:100%;border-radius:20px;transition:width 0.5s cubic-bezier(0.22,1,0.36,1)}

  /* Input field */
  .spell-input{
    width:100%;padding:14px 20px;
    border-radius:14px;
    font-size:22px;font-family:'Nunito',sans-serif;font-weight:800;
    color:#1e1b4b;text-align:center;letter-spacing:3px;
    transition:all 0.3s ease;
    background:#fafafa;
  }
  .spell-input::placeholder{color:#c4b5fd;font-weight:600;letter-spacing:1px;font-size:16px}
  .spell-input:focus{box-shadow:0 0 0 3px rgba(139,92,246,0.2)}

  /* Button styles */
  .btn-primary{
    background:linear-gradient(135deg,var(--accent),var(--accent-dark,var(--accent)));
    color:#fff;border-radius:50px;
    font-family:'Fredoka One',cursive;
    box-shadow:0 6px 20px rgba(0,0,0,0.15);
    position:relative;overflow:hidden;
  }
  .btn-primary::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
    background-size:200% 100%;
    animation:shimmer 3s ease-in-out infinite;
  }
  .btn-secondary{
    background:var(--accent-light,#f0eaff);
    color:var(--accent,#7c4dff);
    border:2px solid rgba(0,0,0,0.06);
    border-radius:50px;font-weight:800;
  }
  .btn-ghost{
    background:rgba(255,255,255,0.15);
    color:#fff;border:2px solid rgba(255,255,255,0.3);
    border-radius:50px;font-family:'Fredoka One',cursive;
  }
  .btn-ghost:hover{background:rgba(255,255,255,0.25)}

  /* Quiz card */
  .quiz-card{
    background:#fff;border-radius:24px;
    padding:28px;
    box-shadow:0 20px 60px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
    position:relative;
  }

  /* Score pill */
  .score-pill{
    background:rgba(255,255,255,0.92);
    border-radius:20px;padding:6px 16px;
    font-weight:900;font-size:16px;color:#374151;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
    display:flex;align-items:center;gap:6px;
  }

  /* Word list items */
  .word-item{
    display:flex;align-items:center;gap:10px;
    background:rgba(255,255,255,0.12);
    border-radius:12px;padding:8px 14px;
    margin-bottom:6px;
    transition:background 0.2s;
  }
  .word-item:hover{background:rgba(255,255,255,0.2)}

  /* Responsive */
  @media(max-width:480px){
    body{padding:12px}
    .quiz-card{padding:20px;border-radius:20px}
  }
</style>

<script>

const WORDS = [
  {word:"response",cat:"'s' spelling",hint:"What you give when someone asks you something"},

let state = {screen:"home",words:[],idx:0,input:"",feedback:null,score:0,lives:3,letterReveal:0,wrongWords:[],speaking:false};

  home: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
  refresh: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>`,

  sparkles: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.2L22 12l-7.6 2.8L12 22l-2.4-7.2L2 12l7.6-2.8L12 2z"/></svg>`,
  lightbulb: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7V17h8v-2.3A7 7 0 0 0 12 2z"/></svg>`,
  pencil: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>`,
  book: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`,

function icon(name, size=16, color='currentColor') {
  return `<span class="icon" style="font-size:${size}px;color:${color};width:${size}px;height:${size}px">${ICONS[name]||''}</span>`;
}

function catBadge(cat, size='normal') {
  const c = COLORS[cat];
  const pad = size==='large' ? '6px 20px' : '4px 14px';
  const fs = size==='large' ? '14px' : '13px';
  const iconSize = size==='large' ? 22 : 18;
  return `<span class="cat-badge" style="background:${c.bg};padding:${pad};font-size:${fs}">
    <span class="badge-icon" style="width:${iconSize}px;height:${iconSize}px;font-size:${Math.round(iconSize*0.6)}px;font-weight:900">${c.icon}</span>
    ${cat}
  </span>`;
}

function shuffle(arr){return [...arr].sort(()=>Math.random()-0.5)}

async function speak(word, slow=false) {
  if(currentAudio){ currentAudio.pause(); currentAudio=null; }
  state.speaking = true;
  render();

  try {
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
      method: 'POST',
      headers: {
        'xi-api-key': API_KEY,
        'Content-Type': 'application/json',
        'Accept': 'audio/mpeg'
      },
      body: JSON.stringify({
        text: word,
        model_id: 'eleven_monolingual_v1',
        voice_settings: {
          stability: slow ? 0.85 : 0.5,
          similarity_boost: 0.75,
          speed: slow ? 0.6 : 1.0
        }
      })
    });

    if(!res.ok) throw new Error('ElevenLabs error');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    if(slow) audio.playbackRate = 0.75;
    currentAudio = audio;
    audio.onended = () => { state.speaking = false; URL.revokeObjectURL(url); render(); };
    audio.onerror = () => { state.speaking = false; render(); };
    await audio.play();
  } catch(e) {
    state.speaking = false;
    if(window.speechSynthesis){
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(word);
      u.rate = slow ? 0.5 : 0.85;
      u.pitch = 1.0;
      window.speechSynthesis.speak(u);
    }
    render();
  }
}

function spawnConfetti(correct) {
  const colors = correct ? ["#fbbf24","#f472b6","#22d3ee","#a78bfa","#34d399","#fb923c"] : ["#ef4444","#f97316"];
  const count = correct ? 28 : 6;
  for(let i=0;i<count;i++){
    const d = document.createElement('div');
    d.className='confetti';
    const size = 5 + Math.random()*8;
    const dx=(Math.random()-0.5)*160, dy=-(80+Math.random()*120);
    const shape = Math.random() > 0.5 ? '50%' : `${2+Math.random()*3}px`;
    d.style.cssText=`left:${25+Math.random()*50}%;top:${15+Math.random()*40}%;width:${size}px;height:${size}px;border-radius:${shape};background:${colors[Math.floor(Math.random()*colors.length)]};--dx:${dx}px;--dy:${dy}px;--rot:${(Math.random()-0.5)*400}deg;opacity:0.9`;
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),950);
  }
}

function startQuiz() {
  const shuffled = shuffle(WORDS);
  state={screen:"quiz",words:shuffled,idx:0,input:"",feedback:null,score:0,lives:3,letterReveal:0,wrongWords:[],speaking:false};
  render();
  setTimeout(()=>speak(shuffled[0].word), 400);
}

function submit() {
  const {words,idx,input,feedback,lives}=state;
  if(!input.trim()||feedback) return;
  const current=words[idx];
  const correct=input.trim().toLowerCase()===current.word.toLowerCase();
  state.feedback=correct?'correct':'wrong';
  spawnConfetti(correct);
  if(correct){ state.score++; }
  else {
    if(!state.wrongWords.find(w=>w.word===current.word)) state.wrongWords.push(current);
    state.lives--;
    setTimeout(()=>speak(current.word,true),600);
  }
  render();
  const nextLives=correct?lives:lives-1;
  setTimeout(()=>{
    state.feedback=null; state.input=''; state.letterReveal=0;
    if(state.idx+1>=state.words.length||nextLives<=0){ state.screen='result'; render(); }
    else { state.idx++; render(); setTimeout(()=>speak(state.words[state.idx].word),400); }
  }, correct?1100:2200);
}

function render() {
  const {screen,words,idx,input,feedback,score,lives,letterReveal,wrongWords,speaking}=state;
  const current=words[idx];
  const cc=current?COLORS[current.cat]:null;
  const progress=words.length?(idx/words.length)*100:0;
  const pct=score/(words.length||1);

  if(screen==='home'){
    document.body.style.background='linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#d946ef 100%)';
    document.getElementById('app').innerHTML=`
      <div class="fadeUp" style="text-align:center;max-width:480px;width:100%">
        <div class="float" style="margin-bottom:12px;color:#fff;opacity:0.95">${icon('pencil',64)}</div>
        <h1 style="font-family:'Fredoka One',cursive;font-size:40px;color:#fff;margin:0 0 8px;text-shadow:0 2px 12px rgba(0,0,0,0.15)">Spelling Quiz</h1>
        <p style="color:rgba(255,255,255,0.92);font-weight:800;font-size:17px;margin:0 0 4px">Spelling List 14 &middot; The /s/ Sound</p>
        <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin:6px 0 4px;color:rgba(255,255,255,0.8);font-size:14px;font-weight:700">
          ${icon('volume',14)} Powered by ElevenLabs &mdash; real voice!
        </div>
        <p style="color:rgba(255,255,255,0.6);font-size:13px;margin-bottom:28px">${WORDS.length} words &middot; 3 lives &middot; Slow button replays clearly</p>

        <div class="glass" style="border-radius:20px;padding:18px 20px;margin-bottom:28px;text-align:left">
          ${Object.entries(COLORS).map(([cat,c])=>`
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">
              ${catBadge(cat)}
              <span style="color:rgba(255,255,255,0.78);font-size:13px;font-weight:600">${WORDS.filter(w=>w.cat===cat).map(w=>w.word).join(', ')}</span>
            </div>`).join('')}
        </div>

        <button onclick="startQuiz()" class="btn-primary" style="--accent:#fff;--accent-dark:#f0f0f0;color:#7c3aed;padding:18px 56px;font-size:22px;display:inline-flex;align-items:center;gap:10px">
          ${icon('rocket',22,'#7c3aed')} Start!
        </button>
      </div>`;
  }

  else if(screen==='quiz'&&current){
    document.body.style.background=`linear-gradient(160deg,${cc.light} 0%,#fff 100%)`;
    const hintWord=current.word.slice(0,letterReveal)+'_ '.repeat(current.word.length-letterReveal).trim();
    const speakerBtn = speaking
      ? `<span style="display:inline-flex;align-items:center;gap:6px"><span style="display:inline-block;width:14px;height:14px;border:2.5px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite"></span>Playing&hellip;</span>`
      : `<span style="display:inline-flex;align-items:center;gap:6px">${icon('volume',16,'#fff')} Hear Word</span>`;

    document.getElementById('app').innerHTML=`
      <div style="width:100%;max-width:500px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <div style="display:flex;gap:4px">
            ${[0,1,2].map(i=>`<span class="heart ${i<lives?'':'heart--empty'}" style="color:#ef4444;font-size:24px">${icon('heart',24,i<lives?'#ef4444':'#d1d5db')}</span>`).join('')}
          </div>
          <div class="score-pill">
            ${icon('star',16,'#f59e0b')}
            <span>${score} / ${words.length}</span>
          </div>
        </div>

        <div class="progress-track" style="margin-bottom:20px">
          <div class="progress-fill" style="width:${progress}%;background:linear-gradient(90deg,${cc.bg},${cc.ring})"></div>
        </div>

        <div id="card" class="quiz-card ${feedback==='wrong'?'shake':feedback==='correct'?'bounce':'fadeUp'}" style="border-top:4px solid ${cc.bg}">
          <div style="text-align:center;margin-bottom:12px">
            ${catBadge(current.cat, 'large')}
          </div>
          <p style="text-align:center;color:#9ca3af;font-size:13px;font-weight:700;margin-bottom:16px">Word ${idx+1} of ${words.length}</p>

          <div style="display:flex;gap:10px;margin-bottom:16px;justify-content:center">
            <button onclick="speak('${current.word}')" ${speaking?'disabled':''} class="btn-primary" style="--accent:${cc.bg};padding:12px 24px;font-size:15px;font-family:'Fredoka One',cursive;opacity:${speaking?0.85:1}">${speakerBtn}</button>
            <button onclick="speak('${current.word}',true)" ${speaking?'disabled':''} class="btn-secondary" style="background:${cc.light};color:${cc.bg};padding:12px 18px;font-size:14px;display:inline-flex;align-items:center;gap:6px;opacity:${speaking?0.6:1}">${icon('turtle',16,cc.bg)} Slow</button>
          </div>

          <div style="background:${cc.light};border-radius:14px;padding:12px 16px;margin-bottom:18px;text-align:center;font-size:15px;color:#4b5563;font-weight:700;line-height:1.5;display:flex;align-items:center;justify-content:center;gap:8px">
            ${icon('lightbulb',18,cc.bg)}
            <span>${current.hint}</span>
          </div>

          ${letterReveal>0?`<div class="pop" style="text-align:center;font-size:26px;letter-spacing:6px;font-family:'Fredoka One',cursive;color:${cc.bg};margin-bottom:14px">${hintWord}</div>`:''}

          <input id="spellInput" class="spell-input" value="${input.replace(/"/g,'&quot;')}" placeholder="Type the word…"
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
            ${feedback?'disabled':''}
            style="border:3px solid ${feedback==='correct'?'#22c55e':feedback==='wrong'?'#ef4444':cc.bg};background:${feedback==='correct'?'#f0fdf4':feedback==='wrong'?'#fef2f2':'#fafafa'}">

          ${feedback?`<div class="pop" style="text-align:center;margin-top:14px;font-size:20px;font-family:'Fredoka One',cursive;color:${feedback==='correct'?'#16a34a':'#dc2626'};display:flex;align-items:center;justify-content:center;gap:8px">
            ${feedback==='correct'
              ? `${icon('check',22,'#16a34a')} ${PRAISE[Math.floor(Math.random()*PRAISE.length)].text}`
              : `<span>It's spelled &ldquo;${current.word}&rdquo;</span>`
            }</div>`:''}

          ${!feedback?`
          <div style="display:flex;gap:10px;margin-top:18px">
            <button onclick="state.letterReveal=Math.min(state.letterReveal+1,${current.word.length});render()" class="btn-secondary" style="flex:1;background:${cc.light};color:${cc.bg};border-radius:14px;padding:12px 8px;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:6px">
              ${icon('search',15,cc.bg)} Hint <span style="opacity:0.6">${letterReveal}/${current.word.length}</span>
            </button>
            <button onclick="submit()" class="btn-primary" style="flex:2;--accent:${cc.bg};border-radius:14px;padding:12px 20px;font-size:18px;font-family:'Fredoka One',cursive;display:inline-flex;align-items:center;justify-content:center;gap:8px">
              ${icon('check',18,'#fff')} Check
            </button>
          </div>`:''}
        </div>
      </div>`;

    const inp=document.getElementById('spellInput');
    if(inp&&!feedback){
      inp.focus();
      inp.oninput=e=>{state.input=e.target.value;};
      inp.onkeydown=e=>{if(e.key==='Enter')submit();};
    }
  }

  else if(screen==='result'){
    document.body.style.background='linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#d946ef 100%)';
    const resultIcon = pct===1 ? icon('trophy',64,'#fbbf24') : pct>=0.8 ? icon('star',64,'#fbbf24') : pct>=0.6 ? icon('sparkles',64,'#fbbf24') : icon('heart',64,'#f472b6');

    document.getElementById('app').innerHTML=`
      <div class="fadeUp" style="text-align:center;max-width:500px;width:100%">
        <div style="margin-bottom:12px">${resultIcon}</div>
        <h2 style="font-family:'Fredoka One',cursive;font-size:38px;color:#fff;margin:0 0 6px;text-shadow:0 2px 12px rgba(0,0,0,0.15)">${pct===1?'Perfect Score!':pct>=0.8?'Great Job!':pct>=0.6?'Nice Work!':'Keep Going!'}</h2>
        <p style="color:rgba(255,255,255,0.9);font-size:22px;font-weight:800;margin-bottom:24px">${score} out of ${words.length} correct</p>

        ${wrongWords.length>0?`
        <div class="glass" style="border-radius:20px;padding:18px 22px;margin-bottom:28px;text-align:left">
          <p style="color:#fff;font-weight:800;font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px">${icon('book',18,'#fff')} Practice these words:</p>
          ${wrongWords.map(w=>`
            <div class="word-item">
              ${catBadge(w.cat)}
              <span style="color:#fff;font-weight:900;font-size:17px;flex:1">${w.word}</span>
              <button onclick="speak('${w.word}')" style="background:rgba(255,255,255,0.18);color:#fff;border:none;border-radius:20px;padding:6px 14px;font-size:14px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:4px">
                ${icon('volume',14,'#fff')}
              </button>
            </div>`).join('')}
        </div>`:''}

        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
          <button onclick="startQuiz()" class="btn-primary" style="--accent:#fff;color:#7c3aed;padding:16px 36px;font-size:18px;display:inline-flex;align-items:center;gap:8px">
            ${icon('refresh',18,'#7c3aed')} Try Again
          </button>
          <button onclick="state.screen='home';render()" class="btn-ghost" style="padding:16px 28px;font-size:18px;display:inline-flex;align-items:center;gap:8px">
            ${icon('home',18,'#fff')} Home
          </button>
        </div>
      </div>`;
  }
}

render();

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
